upstream flask_cluster {
    # Tự động load balance cho tất cả các replica của service flask-api
    server flask-api:5005;
}

server {
    listen 80;

    # Phục vụ Dashboard tĩnh (HTML/CSS/JS)
    location / {
        root /usr/share/nginx/html;
        index dashboard.html;
    }

    # Proxy các request dự báo (Real-time Prediction) tới cluster Flask
    location /predict {
        proxy_pass http://flask_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API Health check
    location /health {
        proxy_pass http://flask_cluster;
    }
}
