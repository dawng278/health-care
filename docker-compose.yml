version: '3.8'

services:
  # === HADOOP CLUSTER ===
  namenode:
    build:
      context: ./docker/hadoop
      dockerfile: Dockerfile.namenode
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"   # Web UI
      - "9000:9000"   # HDFS RPC
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./hadoop/data/raw:/hadoop/data/raw
    environment:
      - CLUSTER_NAME=healthcare-cluster
    networks:
      - hadoop-net

  datanode1:
    build:
      context: ./docker/hadoop
      dockerfile: Dockerfile.datanode
    container_name: datanode1
    hostname: datanode1
    volumes:
      - datanode1_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - hadoop-net

  datanode2:
    build:
      context: ./docker/hadoop
      dockerfile: Dockerfile.datanode
    container_name: datanode2
    hostname: datanode2
    volumes:
      - datanode2_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - hadoop-net

  # === HIVE SERVER ===
  hive-server:
    build:
      context: ./docker/hive
      dockerfile: Dockerfile.hive
    container_name: hive-server
    hostname: hive-server
    ports:
      - "10000:10000"  # HiveServer2
      - "10002:10002"  # Hive Web UI
    volumes:
      - ./hadoop/hive:/hive-queries
    depends_on:
      - namenode
      - datanode1
    networks:
      - hadoop-net

  # === FLASK AI API ===
  flask-api:
    build:
      context: .
      dockerfile: docker/flask/Dockerfile
    container_name: flask-api
    # (scale manually bằng --scale)
    ports:
      - "5005-5007:5005" 
    volumes:
      - ./ml:/app/ml
      - ./hadoop/data/raw:/app/hadoop/data/raw
      - ./output:/app/output
    environment:
      - FLASK_ENV=production
    networks:
      - hadoop-net

  # === LOAD BALANCER ===
  nginx-lb:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./output:/usr/share/nginx/html
    depends_on:
      - flask-api
    networks:
      - hadoop-net

  # === STREAMING INFRA ===
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - hadoop-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - hadoop-net

  # === DASHBOARD (Nginx - Phụ cho local) ===
  # (Nginx-LB đã gộp chức năng này)

  # === SPARK CLUSTER ===
  spark-master:
    image: bitnamilegacy/spark:3.5.0
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_MESSAGE_MAX_SIZE=512
      - SPARK_LOCAL_DIR=/tmp/spark-events
    ports:
      - "8081:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC
    networks:
      - hadoop-net
    volumes:
      - .:/app
      - ./spark_tmp:/tmp/spark-events

  spark-worker-1:
    image: bitnamilegacy/spark:3.5.0
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3g
      - SPARK_LOCAL_DIR=/tmp/spark-events
    depends_on:
      - spark-master
    networks:
      - hadoop-net
    volumes:
      - .:/app
      - ./spark_tmp:/tmp/spark-events

  spark-worker-2:
    image: bitnamilegacy/spark:3.5.0
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3g
      - SPARK_LOCAL_DIR=/tmp/spark-events
    depends_on:
      - spark-master
    networks:
      - hadoop-net
    volumes:
      - .:/app
      - ./spark_tmp:/tmp/spark-events

  # === AIRFLOW ORCHESTRATION ===
  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: airflow-web
    ports:
      - "8082:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./hadoop/data/raw:/data/raw
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    command: >
      bash -c "airflow db init && 
               airflow users create --username admin --password admin --role Admin --email admin@local --firstname Admin --lastname User &&
               airflow webserver"
    networks:
      - hadoop-net

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: airflow-sched
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    command: airflow scheduler
    depends_on:
      - airflow-webserver
    networks:
      - hadoop-net

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:

networks:
  hadoop-net:
    driver: bridge
